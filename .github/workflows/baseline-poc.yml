name: Baseline Orchestration (PoC)

on:
  workflow_dispatch:

jobs:
  enqueue-job:
    name: Enqueue Baseline Jobs to RabbitMQ
    runs-on: ubuntu-latest

    steps:
      - name: Install Python dependency
        run: |
          pip install pika

      - name: Enqueue jobs
        run: |
          python <<EOF
          import pika

          connection = pika.BlockingConnection(
              pika.ConnectionParameters(
                  host="rabbitmq.messaging.svc.cluster.local",
                  credentials=pika.PlainCredentials("admin", "admin123")
              )
          )

          channel = connection.channel()
          channel.queue_declare(queue="github-jobs", durable=True)

          # Enqueue multiple jobs to simulate load
          for i in range(3):
              channel.basic_publish(
                  exchange="",
                  routing_key="github-jobs",
                  body=f"baseline-job-{i}"
              )
              print(f"Enqueued baseline-job-{i}")

          connection.close()
          EOF

  fetch-ecu-manifests:
    name: Fetch ECU Manifests
    needs: enqueue-job
    runs-on: arc-runner-set

    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install requests

      - name: Fetch ECU manifests
        run: python scripts/fetch_ecu_manifests.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload fetched ECU manifests
        uses: actions/upload-artifact@v4
        with:
          name: fetched-ecu-manifests
          path: artifacts/

  assemble-baseline:
    name: Assemble Baseline Manifest
    needs: fetch-ecu-manifests
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fetched ECU manifests
        uses: actions/download-artifact@v4
        with:
          name: fetched-ecu-manifests
          path: artifacts/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Generate baseline manifest
        run: python scripts/combine_manifests.py

      - name: Upload baseline manifest
        uses: actions/upload-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/baseline-manifest.yaml

  sanity-tests:
    name: Run Baseline Sanity Tests
    needs: assemble-baseline
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download baseline manifest
        uses: actions/download-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Run sanity checks
        run: python scripts/sanity_check_baseline.py

  deploy-mock:
    name: Deploy Baseline to System Rig (Mock)
    needs: sanity-tests
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download baseline manifest
        uses: actions/download-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Prepare deployment directory
        run: |
          mkdir -p deployment

      - name: Deploy baseline (mock)
        run: python scripts/deploy_baseline_mock.py

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment/deployment-report.yaml
