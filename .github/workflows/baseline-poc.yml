name: Baseline Orchestration (PoC)

on:
  workflow_dispatch:

jobs:
  fetch-ecu-manifests:
    name: Fetch ECU Manifests + Enqueue Jobs
    runs-on: arc-runner-set

    permissions:
      contents: read
      actions: read

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # 3️⃣ Install dependencies
      - name: Install Python dependencies
        run: |
          pip install requests pika

      # 4️⃣ Enqueue baseline jobs to RabbitMQ (INSIDE AKS, DNS SAFE)
      - name: Enqueue baseline jobs to RabbitMQ
        run: |
          python <<EOF
          import pika
          import time
          import sys

          RABBITMQ_HOST = "rabbitmq.messaging.svc.cluster.local"
          RABBITMQ_PORT = 5672
          USERNAME = "admin"
          PASSWORD = "admin123"
          QUEUE_NAME = "github-jobs"

          credentials = pika.PlainCredentials(USERNAME, PASSWORD)

          connection = None
          for attempt in range(10):
              try:
                  print(f"[Attempt {attempt+1}] Connecting to RabbitMQ at {RABBITMQ_HOST}...")
                  connection = pika.BlockingConnection(
                      pika.ConnectionParameters(
                          host=RABBITMQ_HOST,
                          port=RABBITMQ_PORT,
                          credentials=credentials,
                          heartbeat=30,
                          blocked_connection_timeout=30
                      )
                  )
                  print("Connected to RabbitMQ")
                  break
              except Exception as e:
                  print(f"RabbitMQ not ready or DNS not resolved yet: {e}")
                  time.sleep(5)

          if not connection:
              print("Failed to connect to RabbitMQ after retries")
              sys.exit(1)

          channel = connection.channel()
          channel.queue_declare(queue=QUEUE_NAME, durable=True)

          for i in range(3):
              msg = f"baseline-job-{i}"
              channel.basic_publish(
                  exchange="",
                  routing_key=QUEUE_NAME,
                  body=msg
              )
              print(f"Enqueued: {msg}")

          connection.close()
          print("All jobs enqueued successfully")
          EOF

      # 5️⃣ Fetch ECU manifests
      - name: Fetch ECU manifests
        run: python scripts/fetch_ecu_manifests.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ Upload fetched ECU manifests
      - name: Upload fetched ECU manifests
        uses: actions/upload-artifact@v4
        with:
          name: fetched-ecu-manifests
          path: artifacts/

  assemble-baseline:
    name: Assemble Baseline Manifest
    needs: fetch-ecu-manifests
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download fetched ECU manifests
        uses: actions/download-artifact@v4
        with:
          name: fetched-ecu-manifests
          path: artifacts/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Generate baseline manifest
        run: python scripts/combine_manifests.py

      - name: Upload baseline manifest
        uses: actions/upload-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/baseline-manifest.yaml

  sanity-tests:
    name: Run Baseline Sanity Tests
    needs: assemble-baseline
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download baseline manifest
        uses: actions/download-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Run sanity checks
        run: python scripts/sanity_check_baseline.py

  deploy-mock:
    name: Deploy Baseline to System Rig (Mock)
    needs: sanity-tests
    runs-on: arc-runner-set

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download baseline manifest
        uses: actions/download-artifact@v4
        with:
          name: baseline-manifest
          path: baseline/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install pyyaml

      - name: Prepare deployment directory
        run: |
          mkdir -p deployment

      - name: Deploy baseline (mock)
        run: python scripts/deploy_baseline_mock.py

      - name: Upload deployment report
        uses: actions/upload-artifact@v4
        with:
          name: deployment-report
          path: deployment/deployment-report.yaml
